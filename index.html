<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giovanna Sousa | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="page">
    <main class="main">

      <section class="section hero">
        <div class="container hero-grid">
          <h1>Giovanna Sousa</h1>
          <p>Product Owner</p>
        </div>
      </section>

      <section class="section about">
        <div class="container about-grid">
          <div class="title-block">
            <h2>About</h2>
          </div>

          <div class="content-block">
            <p>
              Sou Product Owner com foco em estratégia, produto digital,
              experiência do usuário e entrega de valor.
            </p>
          </div>
        </div>
      </section>

      <section class="section expertise">
        <div class="container expertise-box">
          <h2>Expertise</h2>

          <div class="expertise-cards">
            <div class="glass-card">Produto</div>
            <div class="glass-card">UX</div>
            <div class="glass-card">Agile</div>
            <div class="glass-card">Discovery</div>
            <div class="glass-card">Delivery</div>
          </div>
        </div>
      </section>

      <section class="section competence">
        <div class="container competence-grid">
          <div class="competence-card"></div>
          <div class="competence-card"></div>
          <div class="competence-card"></div>
          <div class="competence-card"></div>
          <div class="competence-card"></div>
          <div class="competence-card"></div>
          <div class="competence-card"></div>
        </div>
      </section>

      <section class="section experience">
        <div class="container experience-box">
          <h2>Experience</h2>

          <div class="experience-grid">
            <div class="experience-card"></div>
            <div class="experience-card"></div>
            <div class="experience-card"></div>
            <div class="experience-card"></div>
            <div class="experience-card"></div>
            <div class="experience-card"></div>
          </div>
        </div>
      </section>

      <section class="section skills">
        <div class="container skills-container">
          <div class="skills-card"></div>
        </div>
      </section>

      <section class="section process">
        <div class="container process-grid">
          <div class="process-card"></div>
          <div class="process-card active"></div>
          <div class="process-card"></div>
        </div>
      </section>

      <section class="section cta">
        <div class="container">
          <div class="cta-card"></div>
        </div>
      </section>

      <footer class="section footer">
        <div class="container footer-content">
          <p>© 2026 Giovanna Sousa</p>
        </div>
      </footer>

    </main>
  </div>
</body>
</html>
